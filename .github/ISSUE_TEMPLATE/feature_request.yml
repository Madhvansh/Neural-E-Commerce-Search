name: Feature request
description: Propose a focused improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What cannot be done today, and who would benefit?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the smallest useful implementation.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evaluation plan
      description: How should the change be tested or measured?
    validations:
      required: true
