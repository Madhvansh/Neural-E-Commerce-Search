name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install lint/test tooling
        # The full DL stack is not needed for the unit suite: torch-dependent
        # tests skip gracefully, keeping CI fast and deterministic.
        run: |
          python -m pip install --upgrade pip
          pip install numpy pyyaml pytest pytest-cov ruff

      - name: Ruff lint
        run: ruff check src tests scripts

      - name: Run tests
        run: pytest --cov=necs --cov-report=term-missing

      - name: Offline demo smoke test
        run: python scripts/offline_demo.py --json --top-k 3

      - name: Browser lab syntax check
        run: |
          node --check docs/assets/lab.js
          node --check docs/assets/lab-core.mjs
          node tests/browser_lab_smoke.mjs

  package-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Build wheel and source distribution
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Install and run the built wheel in a clean environment
        run: |
          python -m venv .venv-smoke
          .venv-smoke/bin/python -m pip install dist/*.whl
          .venv-smoke/bin/necs-demo --json --top-k 3
          .venv-smoke/bin/necs-validate \
            --qrels examples/validation/sample.qrels \
            --run examples/validation/sample.run \
            --expected-task task1_ranking

  action-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run the repository as a local composite action
        uses: ./
        with:
          qrels: examples/validation/sample.qrels
          run: examples/validation/sample.run
          expected-task: task1_ranking
