name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install lint/test tooling
        # The full DL stack is not needed for the unit suite: torch-dependent
        # tests skip gracefully, keeping CI fast and deterministic.
        run: |
          python -m pip install --upgrade pip
          pip install numpy pyyaml pytest pytest-cov ruff

      - name: Ruff lint
        run: ruff check src tests

      - name: Run tests
        run: pytest --cov=necs --cov-report=term-missing
